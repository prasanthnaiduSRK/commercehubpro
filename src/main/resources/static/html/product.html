<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Products | CommerceHub</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/product.css">

</head>

<body>

<header>

    <div class="container">

        <nav class="navbar">

            <div class="logo">

                <h2>CommerceHub</h2>

            </div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="wishlist.html" class="nav-btn wishlist-btn">❤️ Wishlist</a></li>

                <li><a href="cart.html" class="nav-btn cart-btn">🛒 Cart</a></li>

            </ul>

        </nav>

    </div>

</header>
<section class="products">

    <div class="container">

        <div class="products-header">

            <h1>All Products</h1>

            <p>Explore our latest collections</p>

        </div>

        <div class="toolbar">

            <input
                    type="text"
                    id="search"
                    placeholder="Search Product">

            <button id="searchBtn">

                Search

            </button>

        </div>

        <div
                class="products-grid"
                id="productsGrid">

        </div>

    </div>

</section>

<div id="toast"></div>

<script src="../js/products.js"></script>
<script src="../js/common.js"></script>

</html>
