<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/profile.css">

</head>

<body>

<header>

    <div class="container">

        <nav class="navbar">

            <h2>CommerceHub</h2>

            <a href="index.html">

                ← Home

            </a>

        </nav>

    </div>

</header>

<section class="profile-page">

    <div class="container">

        <div class="profile-card">

            <div class="profile-image">

                👤

            </div>

            <h2 id="userName">

                Loading...

            </h2>

            <p id="userRole">

                Role

            </p>

            <div class="profile-details">

                <div class="detail">

                    <span>Name</span>

                    <h4 id="name"></h4>

                </div>

                <div class="detail">

                    <span>Email</span>

                    <h4 id="email"></h4>

                </div>


            </div>

            <div class="buttons">

                <a href="orderhistory.html">

                    <button>

                        My Orders

                    </button>

                </a>

                <a href="wishlist.html">

                    <button>

                        Wishlist

                    </button>

                </a>

                <button
                        class="logout"
                        onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

    </div>

</section>

<div id="toast"></div>

<script src="../js/profile.js"></script>
<script src="../js/common.js"></script>

</body>

</html>
